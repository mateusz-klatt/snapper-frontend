name: audit

on:
  schedule:
    - cron: '17 5 * * 1'
  pull_request:
    branches: [master]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/audit.yml'
  workflow_dispatch:

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pnpm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack (pnpm via packageManager)
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run pnpm audit (high+ severities)
        run: pnpm audit --audit-level high
