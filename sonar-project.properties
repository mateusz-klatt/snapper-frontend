sonar.projectKey=mateusz-klatt_snapper-frontend
sonar.organization=mateusz-klatt

sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.exclusions=dist/**,node_modules/**,coverage/**,build/**,public/icons/**,**/*.generated.*,scripts/**,src/locales/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,*.config.ts,*.config.js,**/*.generated.*,vite.config.ts,vitest.config.ts,src/locales/**,src/i18n/types.ts,src/i18n/config.ts,src/test/**
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.typescript.tsconfigPaths=tsconfig.json
sonar.javascript.environments=browser,node

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# These act() calls wrap renderHook state setters and synthetic hashchange
# events. Removing them produces React updates outside the required test
# transaction, so suppress S8980 only for this hook test.
sonar.issue.ignore.multicriteria=requiredHashRoutingAct
sonar.issue.ignore.multicriteria.requiredHashRoutingAct.ruleKey=typescript:S8980
sonar.issue.ignore.multicriteria.requiredHashRoutingAct.resourceKey=src/hooks/useHashRouting.test.ts

sonar.sourceEncoding=UTF-8
